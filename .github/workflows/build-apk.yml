name: Build Walton AC Remote APK

on:
  push:
    branches:
      - master
      - main
      - 'claude/**'
    paths:
      - 'WaltonACRemote/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: Build debug APK
        run: gradle -p WaltonACRemote :app:assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WaltonACRemote-debug-apk
          path: WaltonACRemote/app/build/outputs/apk/debug/app-debug.apk
