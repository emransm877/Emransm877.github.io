name: Build Bluetooth Keyboard APK

on:
  push:
    paths:
      - "bluetooth-keyboard/**"
      - ".github/workflows/build-bt-keyboard-apk.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Build debug APK
        working-directory: bluetooth-keyboard
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: bt-keyboard-debug-apk
          path: bluetooth-keyboard/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
