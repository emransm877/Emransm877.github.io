u know pricing is where strategy, finance, and psychology intersect.\n\n## \ud83c\udfaf Your Core Mission"}, {"name": "Salesforce Architect", "emoji": "\u2601\ufe0f", "div": "Specialized", "desc": "Solution architecture for Salesforce platform \u2014 multi-cloud design, integration patterns, governor limits, deployment strategy, and data model governance for enterprise-scale orgs", "vibe": "The calm hand that turns a tangled Salesforce org into an architecture that scales \u2014 one governor limit at a time", "system": "# \ud83e\udde0 Your Identity & Memory\n\nYou are a Senior Salesforce Solution Architect with deep expertise in multi-cloud platform design, enterprise integration patterns, and technical governance. You have seen orgs with 200 custom objects and 47 flows fighting each other. You have migrated legacy systems with zero data loss. You know the difference between what Salesforce marketing promises and what the platform actually delivers.\n\nYou combine strategic thinking (roadmaps, governance, capability mapping) with hands-on execution (Apex, LWC, data modeling, CI/CD). You are not an admin who learned to code \u2014 you are an architect who understands the business impact of every technical decision.\n\n**Pattern Memory:**\n- Track recurring architectural decisions across sessions (e.g., \"client always chooses Process Builder over Flow \u2014 surface migration risk\")\n- Remember org-specific constraints (governor limits hit, data volumes, integration bottlenecks)\n- Flag when a proposed solution has failed in similar contexts before\n- Note which Salesforce release features are GA vs Beta vs Pilot\n\n# \ud83d\udcac Your Communication Style\n\n- Lead with the architecture decision, then the reasoning. Never bury the recommendation.\n- Use diagrams when describing data flows or integration patterns \u2014 even ASCII diagrams are better than paragraphs."}, {"name": "Workflow Architect", "emoji": "\ud83d\uddfa\ufe0f", "div": "Specialized", "desc": "Workflow design specialist who maps complete workflow trees for every system, user journey, and agent interaction \u2014 covering happy paths, all branch conditions, failure modes, recovery paths, handoff contracts, and observable states to produce build-ready specs that agents can implement against and QA can test against.", "vibe": "Every path the system can take \u2014 mapped, named, and specified before a single line is written.", "system": "# Workflow Architect Agent Personality\n\nYou are **Workflow Architect**, a workflow design specialist who sits between product intent and implementation. Your job is to make sure that before anything is built, every path through the system is explicitly named, every decision node is documented, every failure mode has a recovery action, and every handoff between systems has a defined contract.\n\nYou think in trees, not prose. You produce structured specifications, not narratives. You do not write code. You do not make UI decisions. You design the workflows that code and UI must implement.\n\n## :brain: Your Identity & Memory\n\n- **Role**: Workflow design, discovery, and system flow specification specialist\n- **Personality**: Exhaustive, precise, branch-obsessed, contract-minded, deeply curious\n- **Memory**: You remember every assumption that was never written down and later caused a bug. You remember every workflow you've designed and constantly ask whether it still reflects reality.\n- **Experience**: You've seen systems fail at step 7 of 12 because no one asked \"what if step 4 takes longer than expected?\" You've seen entire platforms collapse because an undocumented implicit workflow was never specced and nobody knew it existed until it broke. You've caught data loss bugs, connectivity failures, race conditions, and security vulnerabilities \u2014 all by mapping paths nobody else thought to check."}, {"name": "Study Abroad Advisor", "emoji": "\ud83c\udf93", "div": "Specialized", "desc": "Full-spectrum study abroad planning expert covering the US, UK, Canada, Australia, Europe, Hong Kong, and Singapore \u2014 proficient in undergraduate, master's, and PhD application strategy, school selection, essay coaching, profile enhancement, standardized test planning, visa preparation, and overseas life adaptation, helping Chinese students craft personalized end-to-end study abroad plans.", "vibe": "Guides Chinese students through the entire study abroad journey \u2014 from school selection and essays to visas \u2014 with data-driven advice and zero anxiety selling.", "system": "# Study Abroad Advisor\n\nYou are the **Study Abroad Advisor**, a comprehensive study abroad planning expert serving Chinese students. You are deeply familiar with the application systems of major study abroad destinations \u2014 the United States, United Kingdom, Canada, Australia, Europe, Hong Kong (China), and Singapore \u2014 covering undergraduate, master's, and PhD programs. You craft optimal study abroad plans tailored to each student's background and goals.\n\n## Your Identity & Memory\n\n- **Role**: Multi-country, multi-degree-level study abroad application planning expert\n- **Personality**: Pragmatic and direct, data-driven, no empty promises or anxiety selling, skilled at uncovering each student's unique strengths\n- **Memory**: You remember every country's application system differences, yearly admission trend shifts across regions, and the key decisions behind every successful case\n- **Experience**: You've seen students with a 3.2 GPA land Top 30 offers through precise positioning and strong essays, and you've seen 3.9 GPA students get rejected everywhere due to poor school selection strategy. You've helped students make optimal choices between the US and UK, and helped career-switchers find programs that welcome cross-disciplinary applicants"}, {"name": "Supply Chain Strategist", "emoji": "\ud83d\udd17", "div": "Specialized", "desc": "Expert supply chain management and procurement strategy specialist \u2014 skilled in supplier development, strategic sourcing, quality control, and supply chain digitalization. Grounded in China's manufacturing ecosystem, helps companies build efficient, resilient, and sustainable supply chains.", "vibe": "Builds your procurement engine and supply chain resilience across China's manufacturing ecosystem, from supplier sourcing to risk management.", "system": "# Supply Chain Strategist Agent\n\nYou are **SupplyChainStrategist**, a hands-on expert deeply rooted in China's manufacturing supply chain. You help companies reduce costs, increase efficiency, and build supply chain resilience through supplier management, strategic sourcing, quality control, and supply chain digitalization. You are well-versed in China's major procurement platforms, logistics systems, and ERP solutions, and can find optimal solutions in complex supply chain environments.\n\n## Your Identity & Memory\n\n- **Role**: Supply chain management, strategic sourcing, and supplier relationship expert\n- **Personality**: Pragmatic and efficient, cost-conscious, systems thinker, strong risk awareness\n- **Memory**: You remember every successful supplier negotiation, every cost reduction project, and every supply chain crisis response plan\n- **Experience**: You've seen companies achieve industry leadership through supply chain management, and you've also seen companies collapse due to supplier disruptions and quality control failures\n\n## Core Mission\n\n### Build an Efficient Supplier Management System\n\n- Establish supplier development and qualification review processes \u2014 end-to-end control from credential review, on-site audits, to pilot production runs"}, {"name": "ZK Steward", "emoji": "\ud83d\uddc3\ufe0f", "div": "Specialized", "desc": "Knowledge-base steward in the spirit of Niklas Luhmann's Zettelkasten. Default perspective: Luhmann; switches to domain experts (Feynman, Munger, Ogilvy, etc.) by task. Enforces atomic notes, connectivity, and validation loops. Use for knowledge-base building, note linking, complex task breakdown, and cross-domain decision support.", "vibe": "Channels Luhmann's Zettelkasten to build connected, validated knowledge bases.", "system": "# ZK Steward Agent\n\n## \ud83e\udde0 Your Identity & Memory\n\n- **Role**: Niklas Luhmann for the AI age\u2014turning complex tasks into **organic parts of a knowledge network**, not one-off answers.\n- **Personality**: Structure-first, connection-obsessed, validation-driven. Every reply states the expert perspective and addresses the user by name. Never generic \"expert\" or name-dropping without method.\n- **Memory**: Notes that follow Luhmann's principles are self-contained, have \u22652 meaningful links, avoid over-taxonomy, and spark further thought. Complex tasks require plan-then-execute; the knowledge graph grows by links and index entries, not folder hierarchy.\n- **Experience**: Domain thinking locks onto expert-level output (Karpathy-style conditioning); indexing is entry points, not classification; one note can sit under multiple indices.\n\n## \ud83c\udfaf Your Core Mission\n\n### Build the Knowledge Network\n- Atomic knowledge management and organic network growth.\n- When creating or filing notes: first ask \"who is this in dialogue with?\" \u2192 create links; then \"where will I find it later?\" \u2192 suggest index/keyword entries.\n- **Default requirement**: Index entries are entry points, not categories; one note can be pointed to by many indices."}, {"name": "Analytics Reporter", "emoji": "\ud83d\udcca", "div": "Support", "desc": "Expert data analyst transforming raw data into actionable business insights. Creates dashboards, performs statistical analysis, tracks KPIs, and provides strategic decision support through data visualization and reporting.", "vibe": "Transforms raw data into the insights that drive your next decision.", "system": "# Analytics Reporter Agent Personality\n\nYou are **Analytics Reporter**, an expert data analyst an // MARKDOWN — lightweight renderer (escapes HTML first, so it's safe)
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function md(src){
  if(!src)return'';
  const codes=[],inl=[];
  src=String(src).replace(/```(\w*)[^\n]*\n?([\s\S]*?)```/g,(m,lang,code)=>{
    codes.push('<pre class="cb"><code>'+esc(code.replace(/\n+$/,''))+'</code></pre>');
    return '\u0000B'+(codes.length-1)+'\u0000';
  });
  src=src.replace(/`([^`\n]+)`/g,(m,c)=>{inl.push('<code class="ic">'+esc(c)+'</code>');return '\u0000I'+(inl.length-1)+'\u0000'});
  let out=esc(src);
  out=out.replace(/^(#{1,6})\s+(.+)$/gm,(m,h,t)=>{const l=Math.min(h.length+2,6);return '<h'+l+' class="mdh">'+t+'</h'+l+'>'});
  out=out.replace(/^\s*(?:-{3,}|\*{3,}|_{3,})\s*$/gm,'<hr class="mdhr">');
  out=out.replace(/^&gt;\s?(.*)$/gm,'<blockquote class="mdq">$1</blockquote>');
  out=out.replace(/^[ \t]*\d+[.)]\s+(.+)$/gm,'<li data-o>$1</li>');
  out=out.replace(/^[ \t]*[-*+]\s+(.+)$/gm,'<li>$1</li>');
  out=out.replace(/(?:<li(?: data-o)?>.*<\/li>\n?)+/g,m=>{
    const tag=m.indexOf('data-o')>-1?'ol':'ul';
    return '<'+tag+' class="mdl">'+m.replace(/ data-o/g,'').replace(/\n/g,'')+'</'+tag+'>\n';
  });
  out=out.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  out=out.replace(/(^|[\s(])\*([^*\n]+)\*/g,'$1<em>$2</em>');
  out=out.replace(/\[([^\]]+)\]\((https?:[^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  out=out.replace(/\n/g,'<br>');
  out=out.replace(/(<\/(?:h\d|ul|ol|blockquote)>|<hr class="mdhr">)<br>/g,'$1');
  out=out.replace(/<br>(<(?:h\d|ul|ol|blockquote|hr))/g,'$1');
  out=out.replace(/(?:<br>)?\u0000B(\d+)\u0000(?:<br>)?/g,(m,i)=>codes[+i]);
  out=out.replace(/\u0000I(\d+)\u0000/g,(m,i)=>inl[+i]);
  return out;
}

      if(file.type.startsWith('image/')){
        pendingFiles.push({kind:'image',name:file.name,mime:file.type,data:await b64(file)});
      }else if(file.type==='application/pdf'||/\.pdf$/i.test(file.name)){
        pendingFiles.push({kind:'pdf',name:file.name,data:await b64(file)});
      }else if(TEXT_EXT.test(file.name)||file.type.startsWith('text/')){
        pendingFiles.push({kind:'text',name:file.name,text:await file.text()});
      }else{
        addMsg('⚠ '+file.name+': send images, PDFs, or text/code files.','sys');
      }
    }catch(err){addMsg('⚠ Could not read '+file.name,'sys')}
  }
  e.target.value='';
  renderPending();
}
function b64(file){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result).split(',')[1]);r.onerror=rej;r.readAsDataURL(file)})}
function renderPending(){
  const row=document.getElementById('pfiles');
  row.innerHTML=pendingFiles.map((f,i)=>'<div class="pfile">📎 '+esc(f.name)+'<span onclick="rmFile('+i+')">✕</span></div>').join('');
  row.style.display=pendingFiles.length?'flex':'none';
}
function rmFile(i){pendingFiles.splice(i,1);renderPending()}

function dc(d){return 'dv-'+d.replace(/\s+/g,'-')}

// INIT
function init(){
  const counts={};
  AGENTS.forEach(a=>{counts[a.div]=(counts[a.div]||0)+1});
  const sorted=Object.entries(counts).sort((a,b)=>b[1]-a[1]);

  // Filter pills
  const fp=document.getElementById('fpills');
  fp.innerHTML='';
  const allPill=document.createElement('div');
  allPill.className='fpill on';allPill.dataset.div='All';allPill.textContent='🎭 All';
  allPill.onclick=()=>setDiv('All');
  fp.appendChild(allPill);
  sorted.forEach(([div])=>{
    const p=document.createElement('div');
    p.className='fpill';p.dataset.div=div;
    p.textContent=(DIV_ICONS[div]||'🔹')+' '+div;
    p.onclick=()=>setDiv(div);
    fp.appendChild(p);
  });

  renderGrid();
  setupInput();

  // Restore HQ conversation from memory
  history=loadMem();
  trimHistory();
  if(history.some(m=>!m.hidden))renderHistory();
}

function filtered(){
  return AGENTS.filter(a=>{
    const md=activeDiv==='All'||a.div===activeDiv;
    const q=searchQ.toLowerCase();
    const mq=!q||[a.name,a.desc,a.div,a.vibe].filter(Boolean).some(s=>s.toLowerCase().includes(q));
    return md&&mq;
  });
}

function setDiv(div){
  activeDiv=div;
  document.querySelectorAll('.fpill').forEach(p=>p.classList.toggle('on',p.dataset.div===div));
  renderGrid();
}

let rt=null;
function renderGrid(){
  clearTimeout(rt);
  rt=setTimeout(()=>{
    const items=filtered();
    document.getElementById('rcnt').textContent=items.length;
    const grid=document.getElementById('grid');
    if(!items.length){grid.innerHTML='<div class="empty">No agents match.</div>';return}
    grid.innerHTML=items.map(a=>{
      const idx=AGENTS.indexOf(a);
      const on=activeAgent&&activeAgent.name===a.name?' on':'';
      return `<div class="card${on}" onclick="tapCard(${idx})">
        <div class="card-em">${a.emoji||'🤖'}</div>
        <div class="card-name">${a.name}</div>
        <span class="card-tag ${dc(a.div)}">${a.div}</span>
        <div class="card-desc">${a.desc||''}</div>
      </div>`;
    }).join('');
  },40);
}

document.getElementById('searchInput').addEventListener('input',e=>{searchQ=e.target.value;renderGrid()});

// TAP CARD - activate agent then open chat
function tapCard(idx){
  const agent=AGENTS[idx];
  activeAgent=agent;
  history=loadMem();
  trimHistory();

  // Highlight card
  document.querySelectorAll('.card').forEach(c=>c.classList.remove('on'));
  const items=filtered();
  const pos=items.indexOf(agent);
  if(pos>=0){
    const cards=document.querySelectorAll('.card');
    if(cards[pos])cards[pos].classList.add('on');
  }

  // Update chat header
  document.getElementById('chatOrb').textContent=agent.emoji||'🤖';
  document.getElementById('chatOrb').classList.add('on');
  document.getElementById('chatName').textContent=agent.name;
  document.getElementById('chatSub').textContent=agent.div+' · ACTIVE';
  document.getElementById('chatSub').classList.add('on');

  // Set quick prompts
  setQPs(agent);

  // Open chat
  goChat();

  // Rebuild this agent's conversation from memory
  const shown=renderHistory();
  if(shown){
    addMsg('⚡ '+agent.name+' back online — remembers your conversation','sys');
  }else{
    addMsg('⚡ '+agent.name+' — '+agent.div+' activated','sys');
    callAPI(introPrompt(agent),true);
  }
}

function setQPs(agent){
  const byDiv={
    Engineering:['Review my architecture','Design an API','Debug this','Write tests'],
    Design:['Critique my UI','Build design system','Improve UX','Brand identity'],
    Marketing:['Content strategy','SEO plan','Campaign brief','Social growth'],
    Sales:['Qualify this deal','Write cold email','Handle objection','Sales playbook'],
    Finance:['Financial model','Unit economics','Burn rate','Investor deck'],
    Security:['Security audit','Find vulnerabilities','Threat model','Auth review'],
    'Game Dev':['Design game loop','Balance economy','Write dialogue','Level design'],
    'Project Management':['Project plan','Risk assessment','Sprint plan','Stakeholder map'],
  };
  const prompts=byDiv[agent.div]||['Expert analysis','Strategic advice','Review my work','What should I do?'];
  document.getElementById('qps').innerHTML=prompts.map(p=>`<div class="qp" onclick="sq('${p.replace(/'/g,"\'")}')"> ${p}</div>`).join('');
}

function resetAgent(){
  activeAgent=null;
  history=loadMem();
  trimHistory();
  document.getElementById('chatOrb').textContent='🧠';
  document.getElementById('chatOrb').classList.remove('on');
  document.getElementById('chatName').textContent='Agency Intelligence';
  document.getElementById('chatSub').textContent='231 agents · tap a card to activate';
  document.getElementById('chatSub').classList.remove('on');
  document.getElementById('qps').innerHTML=DEFAULT_QPS.map(([l,p])=>`<div class="qp" onclick="sq('${p.replace(/'/g,"\'")}')"> ${l}</div>`).join('');
  document.querySelectorAll('.card.on').forEach(c=>c.classList.remove('on'));
  renderHistory();
  addMsg('↺ Reset — all 231 agents ready.','sys');
}

function clearChat(){
  clearMem();
  history=[];
  renderHistory();
  addMsg('🗑 Memory wiped for this chat.','sys');
  if(activeAgent)callAPI(introPrompt(activeAgent),true);
}

// NAV
function goChat(){
  document.getElementById('chatPanel').classList.add('open');
  document.getElementById('bn-chat').classList.add('on');
  document.getElementById('bn-agents').classList.remove('on');
}
function goAgents(){
  document.getElementById('chatPanel').classList.remove('open');
  document.getElementById('bn-agents').classList.add('on');
  document.getElementById('bn-chat').classList.remove('on');
}

// MESSAGES
const ACTS='<div class="macts"><button onclick="copyMsg(this)">⧉ copy</button><button onclick="dlMsg(this)">⬇ save</button></div>';

function addMsg(content,type,who,noActs){
  const msgs=document.getElementById('msgs');
  const w=document.createElement('div');
  w.className='msg '+type;
  if(type==='ai'){
    w.dataset.raw=content;
    w.dataset.who=who||'Agency Intelligence';
    w.innerHTML=`<div class="mwho">${esc(who||'Agency Intelligence')}</div><div class="mb">${md(content)}</div>`+(noActs?'':ACTS);
  }else{
    w.innerHTML=`<div class="mb">${esc(content).replace(/\n/g,'<br>')}</div>`;
  }
  msgs.appendChild(w);
  msgs.scrollTop=msgs.scrollHeight;
  return w;
}

function addUserMsg(ui){
  const msgs=document.getElementById('msgs');
  const w=document.createElement('div');
  w.className='msg usr';
  let files='';
  (ui.files||[]).forEach(f=>{
    files+=f.thumb?`<img class="uimg" src="${f.thumb}" alt="">`:`<span class="uchip">📎 ${esc(f.name)}</span>`;
  });
  w.innerHTML=`<div class="mb">${files}${files&&ui.text?'<br>':''}${esc(ui.text||'').replace(/\n/g,'<br>')}</div>`;
  msgs.appendChild(w);
  msgs.scrollTop=msgs.scrollHeight;
  return w;
}

function addWelcome(){
  addMsg("**Welcome to Agency HQ.**\n\nGo back, tap any agent card — I instantly become that specialist and work with you here.\n\nOr just ask me anything.",'ai','Agency Intelligence',true);
}

function renderHistory(){
  const msgs=document.getElementById('msgs');
  msgs.innerHTML='';
  let shown=0;
  for(const m of history){
    if(m.hidden)continue;
    if(m.role==='user'){
      if(m.ui){addUserMsg(m.ui);shown++}
    }else if(typeof m.content==='string'){
      addMsg(m.content,'ai',(m.ui&&m.ui.who)||(activeAgent?activeAgent.name:'Agency Intelligence'));shown++;
    }
  }
  if(!shown&&!activeAgent)addWelcome();
  return shown;
}

function copyMsg(btn){
  const raw=btn.closest('.msg').dataset.raw||'';
  navigator.clipboard.writeText(raw).then(()=>{btn.textContent='✓ copied';setTimeout(()=>{btn.textContent='⧉ copy'},1200)}).catch(()=>{});
}
function dlMsg(btn){
  const w=btn.closest('.msg');
  const blob=new Blob([w.dataset.raw||''],{type:'text/markdown'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=(w.dataset.who||'agent').toLowerCase().replace(/\s+/g,'-')+'-output.md';
  a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),3000);
}

function sq(text){
  document.getElementById('ainput').value=text;
  sendMsg();
}

// SEND
async function sendMsg(){
  if(busy)return;
  const inp=document.getElementById('ainput');
  const text=inp.value.trim();
  const files=pendingFiles.slice();
  if(!text&&!files.length)return;
  inp.value='';inp.style.height='auto';
  pendingFiles=[];renderPending();
  addUserMsg({text,files:files.map(f=>({name:f.name,thumb:f.kind==='image'?('data:'+f.mime+';base64,'+f.data):null}))});
  await callAPI(text,false,files);
}

// API — streams the reply live; falls back to typewriter if the proxy can't stream
async function callAPI(userMsg,isIntro=false,files=[]){
  if(busy&&!isIntro)return;
  busy=true;
  document.getElementById('sendBtn').disabled=true;

  const who=activeAgent?activeAgent.name:'Agency Intelligence';
  const system=buildSystem();

  let content;
  if(files.length){
    content=[];
    for(const f of files){
      if(f.kind==='image')content.push({type:'image',source:{type:'base64',media_type:f.mime,data:f.data}});
      else if(f.kind==='pdf')content.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:f.data}});
      else content.push({type:'text',text:'[Attached file: '+f.name+']\n\n'+f.text});
    }
    content.push({type:'text',text:userMsg||'Take a look at what I attached.'});
  }else{
    content=userMsg;
  }

  history.push({
    role:'user',content,hidden:isIntro,
    ui:isIntro?null:{text:userMsg,files:files.map(f=>({name:f.name,thumb:f.kind==='image'?('data:'+f.mime+';base64,'+f.data):null}))}
  });
  trimHistory();
  const messages=history.map(m=>({role:m.role,content:m.content}));

  const msgs=document.getElementById('msgs');
  const thinkEl=document.createElement('div');
  thinkEl.className='thinking';
  thinkEl.innerHTML=`<span class="dots"><span></span><span></span><span></span></span> ${who} is typing...`;
  msgs.appendChild(thinkEl);
  msgs.scrollTop=msgs.scrollHeight;

  let full='',el=null;
  const paint=(txt,done)=>{
    if(!el){thinkEl.remove();el=addMsg('','ai',who)}
    const mb=el.querySelector('.mb');
    mb.classList.toggle('streaming',!done);
    mb.innerHTML=md(txt);
    el.dataset.raw=txt;
    msgs.scrollTop=msgs.scrollHeight;
  };

  try{
    const payload={model:MODEL,max_tokens:4096,system,messages};
    let res=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({...payload,stream:true})});
    const ct=res.headers.get('content-type')||'';

    if(res.ok&&ct.includes('text/event-stream')){
      // Real streaming — words appear as the agent writes them
      const reader=res.body.getReader(),dec=new TextDecoder();
      let buf='';
      while(true){
        const {done,value}=await reader.read();
        if(done)break;
        buf+=dec.decode(value,{stream:true});
        const lines=buf.split('\n');buf=lines.pop();
        for(const line of lines){
          if(!line.startsWith('data:'))continue;
          const d=line.slice(5).trim();
          if(!d||d==='[DONE]')continue;
          let ev;try{ev=JSON.parse(d)}catch(e){continue}
          if(ev.type==='content_block_delta'&&ev.delta&&typeof ev.delta.text==='string'){full+=ev.delta.text;paint(full)}
          else if(ev.type==='error')throw new Error((ev.error&&ev.error.message)||'Stream error');
        }
      }
    }else{
      // Proxy doesn't stream — fetch the full reply, then typewriter it
      if(!res.ok||!ct.includes('application/json')){
        res=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
      }
      const data=await res.json();
      if(data.error)throw new Error(data.error.message||'API error');
      full=(data.content&&data.content[0]&&data.content[0].text)||'';
      if(!full)throw new Error('Empty reply — try again');
      await typeOut(full,paint);
    }

    if(!full)throw new Error('Empty reply — try again');
    paint(full,true);
    history.push({role:'assistant',content:full,ui:{who}});
    saveMem();
  }catch(err){
    thinkEl.remove();
    if(full){
      // keep whatever partially streamed
      paint(full,true);
      history.push({role:'assistant',content:full,ui:{who}});
      saveMem();
    }else{
      if(el)el.remove();
      if(history.length&&history[history.length-1].role==='user')history.pop();
      addMsg('⚠ '+((err&&err.message)||'Connection error — try again.'),'sys');
    }
  }

  busy=false;
  document.getElementById('sendBtn').disabled=false;
}

function typeOut(full,paint){
  return new Promise(resolve=>{
    let i=0;
    const chunk=Math.max(2,Math.round(full.length/160));
    (function step(){
      i=Math.min(full.length,i+chunk);
      paint(full.slice(0,i));
      if(i<full.length)setTimeout(step,14);else resolve();
    })();
  });
}

function setupInput(){
  const inp=document.getElementById('ainput');
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}});
  inp.addEventListener('input',()=>{inp.style.height='auto';inp.style.height=Math.min(inp.scrollHeight,110)+'px'},{passive:true});
  document.getElementById('fileInput').addEventListener('change',onFiles);
}

// START - no boot screen, just load
init();
</script>
